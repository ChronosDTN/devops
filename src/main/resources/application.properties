server.port=8080

# ─── Datasource Oracle ────────────────────────────────────────────────────────
# Em producao, defina CHRONOS_DB_PASSWORD como variavel de ambiente
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/CHRONOS_DB
spring.datasource.username=system
spring.datasource.password=${CHRONOS_DB_PASSWORD:ChronosSecurePassword2026}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Em producao, defina JWT_SECRET como variavel de ambiente (minimo 64 caracteres)
jwt.secret=${JWT_SECRET:ChronosDTNInterplanetaryKeySecure2026EncryptionSignatureHashHex}
jwt.expiration.ms=3600000

# ─── SpringDoc / Swagger UI ───────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
