services:
  chronos-db-rm562744:
    image: gvenzl/oracle-xe:21-slim
    container_name: chronos-db-rm562744
    restart: always
    environment:
      ORACLE_PASSWORD: ChronosSecurePassword2026
      APP_USER: chronos
      APP_USER_PASSWORD: ChronosSecurePassword2026
      TZ: UTC
    ports:
      - "1521:1521"
    volumes:
      - oracle-data-volume:/opt/oracle/oradata
    networks:
      - dtn-mesh-net
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10

  chronos-api-rm562744:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronos-api-rm562744
    restart: always
    depends_on:
      chronos-db-rm562744:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@chronos-db-rm562744:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: chronos
      SPRING_DATASOURCE_PASSWORD: ChronosSecurePassword2026
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    networks:
      - dtn-mesh-net

networks:
  dtn-mesh-net:
    driver: bridge

volumes:
  oracle-data-volume:
    driver: local   